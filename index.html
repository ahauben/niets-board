<title>Niets — Confidential</title>

<style>
:root{--bg:#0a0b0d;--card:#15171b;--line:rgba(255,255,255,.09);--line2:rgba(255,255,255,.16);
 --ink:#f3f4f2;--dim:#8b9099;--faint:#565c64;--green:#3ad07f;--red:#f4495e;
 --serif:'Playfair Display',Georgia,serif;--mono:'JetBrains Mono',monospace;--sans:'Inter',system-ui,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);background-image:radial-gradient(120% 60% at 50% -10%,rgba(58,208,127,.05),transparent 60%);
 color:var(--ink);font-family:var(--sans);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.box{width:100%;max-width:380px;text-align:center}
.logo{height:46px;width:auto;margin:0 auto 10px;display:block}
.base{font-family:var(--serif);font-style:italic;font-size:13px;color:var(--dim);margin-bottom:30px}
.kick{font-family:var(--mono);font-size:9px;letter-spacing:.2em;color:var(--ink);text-transform:uppercase;margin-bottom:8px}
.sub{font-size:12.5px;color:var(--dim);line-height:1.6;margin-bottom:26px}
.field{position:relative;margin-bottom:14px}
input{width:100%;background:var(--card);border:1px solid var(--line2);border-radius:11px;color:var(--ink);
 font-family:var(--sans);font-size:15px;padding:14px 16px;outline:none;transition:border-color .15s}
input:focus{border-color:var(--green)}
button{width:100%;background:var(--green);color:#06150d;border:none;border-radius:11px;font-family:var(--sans);
 font-weight:600;font-size:15px;padding:14px;cursor:pointer;transition:opacity .15s}
button:disabled{opacity:.55;cursor:default}
.err{color:var(--red);font-family:var(--mono);font-size:11px;letter-spacing:.04em;min-height:16px;margin-top:12px}
.foot{margin-top:34px;font-family:var(--mono);font-size:8.5px;letter-spacing:.1em;color:var(--faint);line-height:1.8}
</style>
</head>

function b2b(b){const s=atob(b),a=new Uint8Array(s.length);for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a;}
async function unlock(){
  const pw=document.getElementById('pw').value, err=document.getElementById('err'), btn=document.getElementById('btn');
  if(!pw){err.textContent='Enter the password.';return;}
  err.textContent='';btn.disabled=true;btn.textContent='Unlocking…';
  try{
    const enc=new TextEncoder();
    const bk=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b2b(SALT),iterations:ITER,hash:'SHA-256'},bk,{name:'AES-GCM',length:256},false,['decrypt']);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b2b(IV)},key,b2b(CT));
    const html=new TextDecoder().decode(pt);
    document.open();document.write(html);document.close();
  }catch(e){
    err.textContent='Incorrect password.';btn.disabled=false;btn.textContent='Unlock';
  }
}
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});
